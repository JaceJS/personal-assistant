# Prod: extends docker-compose.yml with the app and worker containers.
# Usage (from project root):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#   docker compose exec app alembic upgrade head   # first deploy only

services:
  db:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  app:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: ./backend/.env
    command: ["python", "-m", "arq", "app.workers.voice_processor.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
